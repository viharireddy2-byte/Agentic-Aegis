# Least-privilege RBAC for Aegis workloads. The pipeline and dashboard don't
# need to talk to the Kubernetes API for anything today — this exists so that
# if a future feature needs to read its own ConfigMap/Secret at runtime (rather
# than via env vars), the permission is already scoped down to exactly that,
# in this namespace only. No cluster-wide permissions are granted.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: aegis-runner
  namespace: agentic-aegis
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aegis-config-reader
  namespace: agentic-aegis
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["aegis-secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aegis-runner-binding
  namespace: agentic-aegis
subjects:
  - kind: ServiceAccount
    name: aegis-runner
    namespace: agentic-aegis
roleRef:
  kind: Role
  name: aegis-config-reader
  apiGroup: rbac.authorization.k8s.io
